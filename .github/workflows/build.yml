name: "Build"

on:
  push:
    branches:
      - main
  pull_request:

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "microsoft"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build artifacts
        run: ./gradlew build -x test -x jacocoTestReport --no-daemon --stacktrace

      - name: Persist JAR Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: build/libs/*.jar
          retention-days: 30

  javadoc:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate JavaDoc
        run: ./gradlew javadoc --no-daemon --stacktrace

      - name: Persist Documentation
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: javadoc
          retention-days: 30
