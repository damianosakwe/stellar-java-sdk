name: "Deploy"

on:
  release:
    types:
      - created

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "microsoft"

jobs:
  deploy-github:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build all artifacts
        run: ./gradlew build --no-daemon --stacktrace

      - name: Generate JavaDoc
        run: ./gradlew javadoc --no-daemon --stacktrace

      - name: Archive Documentation
        run: tar -czf stellar-java-sdk-javadoc.tar.gz javadoc

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            stellar-java-sdk-javadoc.tar.gz

      - name: Deploy JavaDoc to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: javadoc
          branch: gh-pages
          clean: true

  deploy-maven-central:
    runs-on: ubuntu-latest
    needs: deploy-github
    env:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Validate signing configuration
        run: |
          if [ -z "$SIGNING_KEY" ] || [ -z "$SIGNING_KEY_ID" ] || [ -z "$SIGNING_PASSWORD" ]; then
            echo "Error: Signing configuration is incomplete"
            exit 1
          fi
          if [ -z "$SONATYPE_USERNAME" ] || [ -z "$SONATYPE_PASSWORD" ]; then
            echo "Error: Sonatype credentials are missing"
            exit 1
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Publish to Maven Central
        run: ./gradlew publishAllPublicationsToCentralPortal --no-daemon --stacktrace
